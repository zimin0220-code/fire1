<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알림묶음 시스템</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>📢 알림묶음 시스템</h1>

        <div class="input-box">

            <input type="text"
                   id="message"
                   placeholder="알림 내용을 입력하세요">

            <select id="priority">
                <option value="normal">일반</option>
                <option value="high">긴급</option>
            </select>

            <button id="addBtn">알림 발생</button>

        </div>

        <h2>출력된 알림</h2>

        <div id="output"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
